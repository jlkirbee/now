<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/now — what we're working on</title>
<style>
  :root {
    --bg: #faf8f5;
    --text: #3a3632;
    --muted: #9a938a;
    --border: #e8e4df;
    --label: #b5afa6;
    --green: #7a9a6e;
    --amber: #c49a5c;
    --red: #b56a5c;
    --card-bg: rgba(0,0,0,0.018);
    --tab-hover: rgba(0,0,0,0.04);
    --tab-active-border: var(--text);
  }

  [data-theme="dark"] {
    --bg: #1a1916;
    --text: #d4cfc6;
    --muted: #7a756c;
    --border: #2e2b26;
    --label: #6a655c;
    --green: #8aaa7e;
    --amber: #d4aa6c;
    --red: #c57a6c;
    --card-bg: rgba(255,255,255,0.025);
    --tab-hover: rgba(255,255,255,0.05);
    --tab-active-border: var(--text);
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1a1916;
      --text: #d4cfc6;
      --muted: #7a756c;
      --border: #2e2b26;
      --label: #6a655c;
      --green: #8aaa7e;
      --amber: #d4aa6c;
      --red: #c57a6c;
      --card-bg: rgba(255,255,255,0.025);
      --tab-hover: rgba(255,255,255,0.05);
      --tab-active-border: var(--text);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 1080px;
    margin: 0 auto;
    padding: 3rem 2rem 2rem;
  }

  /* ── Header ── */
  header {
    margin-bottom: 2.8rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.6rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  header h1 span {
    color: var(--muted);
    font-size: 0.9em;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.82rem;
  }

  .header-actions button,
  .header-actions a {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font: inherit;
    font-size: 0.82rem;
    text-decoration: none;
    transition: color 0.2s;
    padding: 0;
  }

  .header-actions button:hover,
  .header-actions a:hover {
    color: var(--text);
  }

  /* ── Tabs (narrow only) ── */
  .tabs {
    display: none;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.6rem;
    gap: 0;
  }

  .tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font: inherit;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.05rem;
    padding: 0.6rem 1.2rem 0.5rem;
    transition: color 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .tab:hover { color: var(--text); background: var(--tab-hover); }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--tab-active-border);
  }

  .tab .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  /* ── Mobile updated line ── */
  .mobile-updated {
    display: none;
    font-size: 0.78rem;
    color: var(--label);
    margin-bottom: 1.2rem;
    letter-spacing: 0.02em;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
  }

  /* ── Column ── */
  .col .updated-line {
    font-size: 0.78rem;
    color: var(--label);
    margin-bottom: 0.35rem;
    letter-spacing: 0.02em;
    text-transform: lowercase;
  }

  .col-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }

  .col-header h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .col-header .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.green { background: var(--green); }
  .dot.gray { background: var(--label); }
  .dot.amber { background: var(--amber); }

  /* ── Vitals ── */
  .vitals {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1rem;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 1.6rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.01em;
  }

  .vital { white-space: nowrap; }
  .vital-val { color: var(--text); font-weight: 500; }
  .vital-val.warn { color: var(--amber); }
  .vital-val.bad { color: var(--red); }

  /* ── Sections ── */
  .section {
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--label);
    margin-bottom: 0.5rem;
    font-weight: 600;
  }

  .current-work {
    font-size: 0.95rem;
    line-height: 1.55;
    color: var(--text);
  }

  .empty {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
  }

  /* ── Sub-agents ── */
  .agent-row {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    padding: 0.3rem 0;
    font-size: 0.85rem;
    line-height: 1.45;
  }

  .agent-badge {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.1em 0.45em;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .agent-badge.running { color: var(--green); background: rgba(122,154,110,0.12); }
  .agent-badge.complete { color: var(--muted); background: var(--card-bg); }
  .agent-badge.queued { color: var(--amber); background: rgba(196,154,92,0.12); }

  .agent-name {
    font-weight: 500;
    color: var(--text);
  }

  .agent-task {
    color: var(--muted);
  }

  /* ── Queue ── */
  .queue-list {
    list-style: none;
  }

  .queue-item {
    font-size: 0.85rem;
    color: var(--text);
    padding: 0.28rem 0;
    padding-left: 1em;
    position: relative;
    line-height: 1.45;
  }

  .queue-item::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--label);
    font-weight: bold;
  }

  /* ── Done ── */
  .done-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    padding: 0.28rem 0;
    font-size: 0.85rem;
    line-height: 1.45;
  }

  .done-task { color: var(--muted); flex: 1; }
  .done-time {
    font-size: 0.75rem;
    color: var(--label);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Footer ── */
  footer {
    margin-top: 3rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--label);
    text-align: center;
    letter-spacing: 0.02em;
  }

  /* ── Loading / Error ── */
  .loading {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
    padding: 2rem 0;
  }

  /* ── Narrow layout ── */
  @media (max-width: 899px) {
    .page { padding: 1.8rem 1.2rem 1.5rem; }

    header h1 { font-size: 1.35rem; }

    .tabs { display: flex; }
    .mobile-updated { display: block; }

    .grid {
      grid-template-columns: 1fr;
      gap: 0;
    }

    .col { display: none; }
    .col.active { display: block; }

    .col .updated-line { display: none; }
    .col .col-header { display: none; }

    .vitals { margin-top: 0; }

    .done-item { flex-direction: column; gap: 0.1rem; }
    .done-time { padding-left: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>/now <span>— what we're working on</span></h1>
    <div class="header-actions">
      <button id="refreshBtn" title="Refresh data">↻ refresh</button>
      <button id="themeBtn" title="Toggle dark mode"></button>
    </div>
  </header>

  <!-- Tabs (narrow only) -->
  <div class="tabs" role="tablist">
    <button class="tab active" role="tab" data-bot="genie" aria-selected="true">
      <span class="dot" id="tab-dot-genie"></span> Genie
    </button>
    <button class="tab" role="tab" data-bot="jett" aria-selected="false">
      <span class="dot" id="tab-dot-jett"></span> Jett
    </button>
  </div>
  <div class="mobile-updated" id="mobile-updated"></div>

  <!-- Grid -->
  <div class="grid">
    <div class="col active" id="col-genie" data-bot="genie">
      <div class="updated-line" id="updated-genie"></div>
      <div class="col-header">
        <span class="dot" id="dot-genie"></span>
        <h2>Genie</h2>
      </div>
      <div class="vitals" id="vitals-genie"></div>
      <div id="content-genie"><div class="loading">Loading…</div></div>
    </div>
    <div class="col" id="col-jett" data-bot="jett">
      <div class="updated-line" id="updated-jett"></div>
      <div class="col-header">
        <span class="dot" id="dot-jett"></span>
        <h2>Jett</h2>
      </div>
      <div class="vitals" id="vitals-jett"></div>
      <div id="content-jett"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <footer id="footer"></footer>
</div>

<script>
(function() {
  'use strict';

  // ── Theme ──
  const themeBtn = document.getElementById('themeBtn');

  function getEffectiveTheme() {
    const saved = localStorage.getItem('theme');
    if (saved) return saved;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function applyTheme() {
    const theme = getEffectiveTheme();
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    themeBtn.textContent = theme === 'dark' ? '☀︎' : '☾';
  }

  themeBtn.addEventListener('click', function() {
    const current = getEffectiveTheme();
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme();
  });

  applyTheme();

  // ── Tabs (narrow) ──
  const tabs = document.querySelectorAll('.tab');
  const cols = document.querySelectorAll('.col');
  let activeBot = 'genie';

  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      activeBot = this.dataset.bot;
      tabs.forEach(function(t) { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
      this.classList.add('active');
      this.setAttribute('aria-selected', 'true');
      cols.forEach(function(c) {
        c.classList.toggle('active', c.dataset.bot === activeBot);
      });
      updateMobileUpdated();
    });
  });

  // ── Data ──
  var data = { genie: null, jett: null };
  var lastFetch = null;

  function timeAgo(isoStr) {
    if (!isoStr) return '';
    var diff = Date.now() - new Date(isoStr).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ' + (mins % 60) + 'm ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  function formatTime(isoStr) {
    if (!isoStr) return '';
    var d = new Date(isoStr);
    return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toLowerCase();
  }

  function isRecent(isoStr, mins) {
    if (!isoStr) return false;
    return (Date.now() - new Date(isoStr).getTime()) < mins * 60000;
  }

  function dotClass(isoStr) {
    return isRecent(isoStr, 30) ? 'green' : 'gray';
  }

  function vitalClass(pct, warnAt, badAt) {
    if (pct == null) return '';
    if (pct >= badAt) return 'bad';
    if (pct >= warnAt) return 'warn';
    return '';
  }

  // ── Render ──
  function renderVitals(bot, d) {
    var el = document.getElementById('vitals-' + bot);
    if (!d || !d.system) { el.innerHTML = ''; return; }
    var s = d.system;
    var parts = [];

    // Battery
    if (s.battery) {
      var bPct = s.battery.percent;
      var bStr = bPct != null ? bPct + '%' : '—';
      if (s.battery.charging) bStr += ' ⚡';
      var bCls = bPct != null ? vitalClass(100 - bPct, 80, 90) : ''; // low battery = warn
      // Actually invert: low percent is bad
      bCls = bPct != null ? (bPct <= 10 ? 'bad' : bPct <= 25 ? 'warn' : '') : '';
      parts.push('<span class="vital">bat <span class="vital-val ' + bCls + '">' + bStr + '</span></span>');
    }

    // Network
    if (s.network) {
      var nStr = s.network.status === 'online' ? s.network.latencyMs + 'ms' : 'offline';
      var nCls = s.network.status !== 'online' ? 'bad' : (s.network.latencyMs > 200 ? 'warn' : s.network.latencyMs > 500 ? 'bad' : '');
      parts.push('<span class="vital">net <span class="vital-val ' + nCls + '">' + nStr + '</span></span>');
    }

    // CPU
    if (s.cpu) {
      var cCls = vitalClass(s.cpu.percent, 70, 90);
      parts.push('<span class="vital">cpu <span class="vital-val ' + cCls + '">' + s.cpu.percent + '%</span></span>');
    }

    // Memory
    if (s.memory) {
      var mCls = vitalClass(s.memory.percent, 75, 90);
      parts.push('<span class="vital">mem <span class="vital-val ' + mCls + '">' + s.memory.percent + '%</span></span>');
    }

    // Disk
    if (s.disk) {
      var dCls = vitalClass(s.disk.usedPercent, 80, 95);
      parts.push('<span class="vital">disk <span class="vital-val ' + dCls + '">' + s.disk.availGb + 'GB free</span></span>');
    }

    // Active sub-agents
    if (d.activeSubAgents != null) {
      parts.push('<span class="vital">agents <span class="vital-val">' + d.activeSubAgents + '</span></span>');
    }

    el.innerHTML = parts.join('');
  }

  function renderUpdated(bot, d) {
    var el = document.getElementById('updated-' + bot);
    var dotEl = document.getElementById('dot-' + bot);
    var tabDotEl = document.getElementById('tab-dot-' + bot);
    var ts = d ? d.lastUpdated : null;
    var cls = dotClass(ts);

    if (dotEl) { dotEl.className = 'dot ' + cls; }
    if (tabDotEl) { tabDotEl.className = 'dot ' + cls; }

    if (ts) {
      el.textContent = 'last updated: ' + formatTime(ts) + ' · ' + timeAgo(ts);
    } else {
      el.textContent = '';
    }
  }

  function updateMobileUpdated() {
    var d = data[activeBot];
    var el = document.getElementById('mobile-updated');
    if (d && d.lastUpdated) {
      el.textContent = 'last updated: ' + formatTime(d.lastUpdated) + ' · ' + timeAgo(d.lastUpdated);
    } else {
      el.textContent = '';
    }
  }

  function escHtml(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderContent(bot, d) {
    var el = document.getElementById('content-' + bot);
    if (!d) { el.innerHTML = '<div class="loading">Loading…</div>'; return; }

    var html = '';

    // Currently
    html += '<div class="section">';
    html += '<div class="section-title">Currently</div>';
    html += d.currentWork
      ? '<div class="current-work">' + escHtml(d.currentWork) + '</div>'
      : '<div class="empty">Nothing right now</div>';
    html += '</div>';

    // Sub-agents
    html += '<div class="section">';
    html += '<div class="section-title">Sub-agents</div>';
    if (d.subAgents && d.subAgents.length > 0) {
      d.subAgents.forEach(function(a) {
        html += '<div class="agent-row">';
        html += '<span class="agent-badge ' + escHtml(a.status) + '">' + escHtml(a.status) + '</span>';
        if (a.name) html += '<span class="agent-name">' + escHtml(a.name) + '</span>';
        if (a.task) html += '<span class="agent-task">' + escHtml(a.task) + '</span>';
        html += '</div>';
      });
    } else {
      html += '<div class="empty">None active</div>';
    }
    html += '</div>';

    // Queue
    html += '<div class="section">';
    html += '<div class="section-title">Queue</div>';
    if (d.queue && d.queue.length > 0) {
      html += '<ul class="queue-list">';
      d.queue.forEach(function(q) {
        html += '<li class="queue-item">' + escHtml(q) + '</li>';
      });
      html += '</ul>';
    } else {
      html += '<div class="empty">Queue empty</div>';
    }
    html += '</div>';

    // Done
    html += '<div class="section">';
    html += '<div class="section-title">Done</div>';
    if (d.recentCompletions && d.recentCompletions.length > 0) {
      d.recentCompletions.forEach(function(c) {
        html += '<div class="done-item">';
        html += '<span class="done-task">' + escHtml(c.task) + '</span>';
        html += '<span class="done-time">' + escHtml(c.time) + '</span>';
        html += '</div>';
      });
    } else {
      html += '<div class="empty">Nothing yet</div>';
    }
    html += '</div>';

    el.innerHTML = html;
  }

  function renderBot(bot) {
    var d = data[bot];
    renderUpdated(bot, d);
    renderVitals(bot, d);
    renderContent(bot, d);
  }

  function renderAll() {
    renderBot('genie');
    renderBot('jett');
    updateMobileUpdated();
    updateFooter();
  }

  function updateFooter() {
    var el = document.getElementById('footer');
    if (lastFetch) {
      el.textContent = 'updated ' + lastFetch.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toLowerCase();
    }
  }

  // ── Fetch ──
  function fetchData() {
    var base = '';
    Promise.all([
      fetch(base + 'genie-status.json?t=' + Date.now()).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }),
      fetch(base + 'jett-status.json?t=' + Date.now()).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; })
    ]).then(function(results) {
      if (results[0]) data.genie = results[0];
      if (results[1]) data.jett = results[1];
      lastFetch = new Date();
      renderAll();
    });
  }

  // ── Refresh ──
  document.getElementById('refreshBtn').addEventListener('click', fetchData);

  // ── Init ──
  fetchData();
  setInterval(fetchData, 30000);

  // Update "ago" text every 10s
  setInterval(function() {
    renderUpdated('genie', data.genie);
    renderUpdated('jett', data.jett);
    updateMobileUpdated();
  }, 10000);

})();
</script>
</body>
</html>
